<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>CEK STATUS TRANSAKSI</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:linear-gradient(135deg,#0a0000,#140000,#1f0000);
color:white;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* BOX */
.box{

background:rgba(40,0,0,0.6);

padding:25px;

border-radius:20px;

width:90%;
max-width:400px;

border:1px solid rgba(255,0,0,0.4);

box-shadow:
0 0 30px rgba(255,0,0,0.5),
inset 0 0 20px rgba(255,0,0,0.3);

backdrop-filter:blur(20px);

text-align:center;

}

/* TITLE */
.title{

font-size:20px;

color:#ff4444;

text-shadow:0 0 10px red;

margin-bottom:15px;

}

/* INPUT */
input{

width:94%;

padding:12px;

margin-top:10px;

border-radius:10px;

border:none;

outline:none;

background:rgba(255,0,0,0.08);

color:white;

border:1px solid rgba(255,0,0,0.3);

font-family:'Orbitron';

}

/* BUTTON */
button{

width:100%;

padding:12px;

margin-top:15px;

border:none;

border-radius:10px;

font-family:'Orbitron';

cursor:pointer;

background:linear-gradient(90deg,#ff0000,#ff4444);

color:white;

box-shadow:0 0 15px red;

}

button:hover{
box-shadow:0 0 30px red;
}

/* RESULT */
.result{

margin-top:20px;

padding:15px;

border-radius:15px;

background:rgba(40,0,0,0.5);

border:1px solid rgba(255,0,0,0.3);

display:none;

}

/* STATUS COLOR */
.Pending{color:gray}
.Diproses{color:orange}
.Sukses{color:lime}
.Gagal{color:red}

/* HELP */
.help{

margin-top:15px;

font-size:12px;

color:#aaa;

}

/* TOAST */
#toast{

position:fixed;

bottom:20px;

left:50%;

transform:translateX(-50%);

background:red;

padding:12px 25px;

border-radius:10px;

display:none;

box-shadow:0 0 20px red;

}

</style>
</head>
<body>


<div class="box">

<div class="title">
CEK STATUS TRANSAKSI
</div>

<input id="idtrx" placeholder="Masukkan ID Transaksi">

<button onclick="cek()">
CEK STATUS
</button>


<div id="result" class="result">

<div>ID: <span id="rid"></span></div>

<div>
Status:
<span id="rstatus"></span>
</div>

</div>


<div class="help">

Jika status tetap Pending, silakan hubungi admin.

</div>

</div>


<div id="toast"></div>


<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

import {
getDatabase,
ref,
get
}
from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";


const firebaseConfig={

apiKey:"AIzaSyADxS4wfQmPgaJ11xxHOBOauVtow1GS_nk",

authDomain:"status-92521.firebaseapp.com",

databaseURL:"https://status-92521-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:"status-92521"

};

const app=initializeApp(firebaseConfig);

const db=getDatabase(app);


/* CEK */
window.cek=async function(){

let id=document.getElementById("idtrx").value.trim();

if(!id){

toast("Masukkan ID dulu");

return;

}

let snap=await get(ref(db,"trx/"+id));

if(snap.exists()){

let data=snap.val();

document.getElementById("result").style.display="block";

document.getElementById("rid").innerText=id;

let statusEl=document.getElementById("rstatus");

statusEl.innerText=data.status;

statusEl.className=data.status;

}else{

toast("ID tidak ditemukan");

}

}


/* TOAST */
function toast(text){

let t=document.getElementById("toast");

t.innerText=text;

t.style.display="block";

setTimeout(()=>{
t.style.display="none";
},2000);

}

</script>


</body>
</html>
